name: Build Android Customized Addendum

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '25.2.9519653' # Standard stable NDK version for RSDKv5

      - name: Strip Time Stones & Miracle Forms
        run: |
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/bUseTimeStones = true/bUseTimeStones = false/g'
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/bUseMiracleForm = true/bUseMiracleForm = false/g'
          echo "Features removed successfully!"

      - name: Compile with CMake for Android
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release
          make

      - name: Upload Android Mod Library
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-Addendum-Android
          path: ./build/*.so
