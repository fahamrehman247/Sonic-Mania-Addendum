name: Build Customized Addendum (Win64)

on:
  push:  # Allows manually clicking "Run Workflow"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Strip Time Stones & Miracle Forms
        shell: bash
        run: |
          # Finds and disables Time Stones/Miracle Forms in the source code files
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/bUseTimeStones = true/bUseTimeStones = false/g' || true
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/bUseMiracleForm = true/bUseMiracleForm = false/g' || true
          echo "Source code successfully modified!"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile Mod for Win64
        run: |
          # Changed Platform to x64 for 64-bit Windows systems
          msbuild SonicMania.sln /p:Configuration=Release /p:Platform=x64
          
      - name: Upload Custom Win64 Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Mania-Addendum-Win64
          path: ./build/
